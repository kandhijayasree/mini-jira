<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mini Jira - Calendar</title>
    <link rel="stylesheet" href="calendar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<div class="calendar-page">

    <aside class="sidebar">
        <div class="logo">
            <span>🚀</span>
            <h2>Mini Jira</h2>
        </div>

        <nav class="menu">
            <a href="../dashboard.html" class="menu-link"><i class="fa-solid fa-house"></i>Dashboard</a>
            <a href="../project/project.html" class="menu-link"><i class="fa-regular fa-folder"></i>Projects</a>
            <a href="../task/task.html" class="menu-link"><i class="fa-regular fa-square-check"></i>Tasks</a>
            <a href="../kanban/kanban.html" class="menu-link"><i class="fa-solid fa-table-columns"></i>Kanban Board</a>
            <a href="calendar.html" class="menu-link active"><i class="fa-regular fa-calendar"></i>Calendar</a>
            <a href="../report/report.html" class="menu-link"><i class="fa-solid fa-chart-simple"></i>Reports</a>
            <a href="../profile/profile.html" class="menu-link"><i class="fa-regular fa-user"></i>Profile</a>
        </nav>

       
    </aside>

    <main class="main">

        <header class="topbar">
            <div>
                <h1>Calendar</h1>
                <p>View tasks by due dates and schedule.</p>
            </div>

            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchCalendar" placeholder="Search tasks..." onkeyup="searchCalendarTasks()">
            </div>
        </header>

        <section class="calendar-card">

            <div class="calendar-header">
                <button onclick="prevMonth()">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>

                <h2 id="monthYear">Month Year</h2>

                <button onclick="nextMonth()">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>

            <div class="weekdays">
                <span>Sun</span>
                <span>Mon</span>
                <span>Tue</span>
                <span>Wed</span>
                <span>Thu</span>
                <span>Fri</span>
                <span>Sat</span>
            </div>

            <div id="calendarDays" class="calendar-days"></div>

        </section>

    </main>

</div>

<script src="calendar.js"></script>

</body>
</html>
