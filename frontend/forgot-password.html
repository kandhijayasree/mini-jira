<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>

    <link rel="stylesheet" href="forgot-password.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="page">

    <div class="dots dots-top"></div>
    <div class="dots dots-bottom"></div>

    <div class="shape shape-left"></div>
    <div class="shape shape-right"></div>

    <div class="reset-box">

        <h1>
            Mini <span>Jira</span> 
        </h1>

        <h2>Reset Password</h2>

        <p>Update your account password</p>

        <form onsubmit="resetPassword(event)">

            <label>Email</label>
            <div class="input-group">
                <i class="fa-regular fa-envelope"></i>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <label>New Password</label>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="newPassword" placeholder="Enter your new password" required>
                <i class=" " onclick="togglePassword('newPassword', this)"></i>
            </div>

            <label>Confirm Password</label>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="confirmPassword" placeholder="Confirm your new password" required>
                <i class=" " onclick="togglePassword('confirmPassword', this)"></i>
            </div>

            <button type="submit">
                Update Password
                <i class="fa-solid fa-arrow-right"></i>
            </button>

            <p id="messageBox"></p>

            <a href="login.html" class="back-link">
                Back To <span>Login</span>
            </a>

        </form>

    </div>

</div>

<script src="forgot-password.js"></script>

</body>
</html>
