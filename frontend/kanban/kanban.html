<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mini Jira - Kanban</title>

    <link rel="stylesheet" href="kanban.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<div class="kanban-page">

    <aside class="sidebar">

        <div class="logo">
            <span>🚀</span>
            <h2>Mini Jira</h2>
        </div>

        <nav class="menu">
            <a href="../dashboard.html" class="menu-link">
                <i class="fa-solid fa-house"></i> Dashboard
            </a>

            <a href="../project/project.html" class="menu-link">
                <i class="fa-regular fa-folder"></i> Projects
            </a>

            <a href="../task/task.html" class="menu-link">
                <i class="fa-regular fa-square-check"></i> Tasks
            </a>

            <a href="kanban.html" class="menu-link active">
                <i class="fa-solid fa-table-columns"></i> Kanban Board
            </a>

            <a href="../calendar/calendar.html" class="menu-link">
                <i class="fa-regular fa-calendar"></i> Calendar
            </a>

            <a href="../report/report.html" class="menu-link">
                <i class="fa-solid fa-chart-simple"></i> Reports
            </a>

            <a href="../profile/profile.html" class="menu-link">
                <i class="fa-regular fa-user"></i> Profile
            </a>
        </nav>

       
    </aside>

    <main class="main">

        <header class="topbar">
            <div>
                <h1>Kanban Board</h1>
                <p>Track tasks by progress and status.</p>
            </div>

            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchKanban" placeholder="Search tasks..." onkeyup="searchKanban()">
            </div>
        </header>

        <section class="stats-grid">

            <div class="stat-card">
                <div class="stat-icon blue">O</div>
                <div>
                    <h2 id="openCount">0</h2>
                    <p>Open Tasks</p>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon orange">P</div>
                <div>
                    <h2 id="progressCount">0</h2>
                    <p>In Progress</p>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon green">C</div>
                <div>
                    <h2 id="completedCount">0</h2>
                    <p>Completed</p>
                </div>
            </div>

        </section>

        <section class="kanban-board">

            <div class="kanban-column open-column">
                <h2>Open</h2>
                <div id="openTasks" class="task-list"></div>
            </div>

            <div class="kanban-column progress-column">
                <h2>In Progress</h2>
                <div id="progressTasks" class="task-list"></div>
            </div>

            <div class="kanban-column completed-column">
                <h2>Completed</h2>
                <div id="completedTasks" class="task-list"></div>
            </div>

        </section>

    </main>

</div>

<script src="kanban.js"></script>

</body>
</html>
