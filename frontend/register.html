<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mini Jira Register</title>
    <link rel="stylesheet" href="register.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="register-page">

    <div class="dots dots-left"></div>
    <div class="dots dots-right"></div>

    <div class="shape shape-one"></div>
    <div class="shape shape-two"></div>

    <div class="left-side">

        <div class="app-icon">
            <i class="fa-solid fa-table-cells-large"></i>
        </div>

        <h1>Mini <span>Jira</span> </h1>

        <div class="line"></div>

        <p>
            Create your account and start<br>
            managing projects and tasks<br>
            efficiently.
        </p>

    </div>

    <div class="divider"></div>

    <div class="right-side">

        <h2>Register</h2>

        <p class="subtitle">
            Create your Mini Jira account
        </p>

        <form onsubmit="register(event)">

            <div class="input-group">
                <i class="fa-regular fa-user"></i>
                <input type="text" id="name" placeholder="Enter Full Name" required>
            </div>

            <div class="input-group">
                <i class="fa-regular fa-envelope"></i>
                <input type="email" id="email" placeholder="Enter Email" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Enter Password" required>
                <i class=" " onclick="togglePassword()"></i>
            </div>

            <button type="submit">
                Register
                <i class="fa-solid fa-arrow-right"></i>
            </button>

            <p id="messageBox"></p>

            <div class="or">OR</div>

            <p class="login-text">
                Already have an account?
                <a href="login.html">Login</a>
            </p>

        </form>

    </div>

</div>

<script src="register.js"></script>

</body>
</html>
